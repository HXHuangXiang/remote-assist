<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RemoteAssist</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="bar">
  <input id="pw" type="password" placeholder="访问密码" autocomplete="current-password">
  <button id="connect">连接</button>
  <select id="monitor"></select>
  <label class="stream-setting" for="quality">画质
    <select id="quality">
      <option value="auto">自动</option>
      <option value="original">原始清晰度</option>
      <option value="1080p">固定 1080p</option>
      <option value="720p">固定 720p</option>
      <option value="540p">固定 540p</option>
      <option value="360p">固定 360p</option>
    </select>
  </label>
  <label class="stream-setting" for="stream-fps">帧率
    <input id="stream-fps" type="number" min="1" max="60" step="1" value="30" list="stream-fps-presets" inputmode="numeric">
    <span>FPS</span>
  </label>
  <datalist id="stream-fps-presets">
    <option value="5"></option><option value="10"></option><option value="15"></option>
    <option value="20"></option><option value="24"></option><option value="30"></option>
    <option value="45"></option><option value="60"></option>
  </datalist>
  <label class="stream-setting" for="stream-bitrate">码率
    <input id="stream-bitrate" type="number" min="0.1" max="6.25" step="0.05" value="0.5" list="stream-bitrate-presets" inputmode="decimal">
    <span>MB/s</span>
  </label>
  <datalist id="stream-bitrate-presets">
    <option value="0.25"></option><option value="0.5"></option><option value="1"></option>
    <option value="2"></option><option value="4"></option><option value="6.25"></option>
  </datalist>
  <label class="stream-setting" for="patch-threshold">局部更新 <output id="patch-threshold-value">50%</output>
    <input id="patch-threshold" type="range" min="10" max="90" step="5" value="50">
  </label>
  <span id="status">未连接</span>
</div>
<div id="screen-wrap">
  <div id="screen-stack">
    <canvas id="screen" tabindex="0"></canvas>
  </div>
</div>
<div id="log"></div>
<script src="app.js"></script>
</body>
</html>
