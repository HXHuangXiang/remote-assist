name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure (CMake + VS18 x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "Visual Studio 18 2026" -A x64 *>&1 |
            Tee-Object -FilePath build/configure.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel *>&1 |
            Tee-Object -FilePath build/build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Validate control page and binary size
        shell: pwsh
        run: |
          node --check web/app.js
          $exe = Get-Item build/Release/RemoteAssist.exe -ErrorAction Stop
          $maxBytes = 8MB
          Write-Host "Release executable size: $($exe.Length) bytes"
          if ($exe.Length -ge $maxBytes) {
            throw "RemoteAssist.exe exceeds the 8 MiB package target."
          }
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/RemoteAssist.exe dist/ -Force
          Copy-Item -Recurse web dist/ -Force
          Compress-Archive -Path dist/* -DestinationPath RemoteAssist.zip
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-build-diagnostics
          path: |
            build/configure.log
            build/build.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-windows
          path: RemoteAssist.zip
