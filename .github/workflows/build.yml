name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
     - uses: actions/checkout@v4
      - name: Set up MSVC dev command
        uses: ilammy/msvc-dev-command@v1
        with:
          arch: x64
     - name: Configure (CMake + VS2022 x64)
       run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build (Release)
        run: cmake --build build --config Release --parallel
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/RemoteAssist.exe dist/
          Copy-Item -Recurse web dist/
          Compress-Archive -Path dist/* -DestinationPath RemoteAssist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-windows
          path: RemoteAssist.zip
