name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (CMake + VS2022 x64)
        shell: cmd
        run: call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64 && cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build (Release)
        run: cmake --build build --config Release --parallel
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/RemoteAssist.exe dist/
          Copy-Item -Recurse web dist/
          Compress-Archive -Path dist/* -DestinationPath RemoteAssist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: RemoteAssist-windows
          path: RemoteAssist.zip

